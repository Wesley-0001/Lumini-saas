<!DOCTYPE html>
<html lang="pt-BR" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google" content="notranslate" />
  <meta http-equiv="Content-Language" content="pt-BR" />
  <title>Lumini — Entrar</title>
  <link rel="icon" type="image/png" href="images/logo-black.png" />
  <link rel="apple-touch-icon" href="images/logo-black.png" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700&family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body>

<!-- TELA DE LOADING -->
<div id="firebase-loading" class="firebase-loading-screen">
  <div class="firebase-loading-box">
    <img src="images/logo-white.png" alt="Lumini" style="height:52px;margin-bottom:24px;opacity:0.95" />
    <div class="firebase-spinner"></div>
    <p class="firebase-loading-text">Conectando ao sistema...</p>
    <p class="firebase-loading-sub">Aguarde um momento ☁️</p>
  </div>
</div>

<!-- TELA DE LOGIN -->
<div id="page-login" class="page active" style="display:none">

  <div class="login-bg">
    <div class="stamps-container" id="stamps-container">
      <div class="stamp-float stamp-tl" data-ref="AD0901" style="--size:145px;--dur:7s;--delay:0s;--rot:-14deg">
        <div class="stamp-img-wrap"><img src="images/stamp-1.jpg" alt="Estampa AD0901" draggable="false" /></div>
        <div class="stamp-ref">AD0901</div>
      </div>
      <div class="stamp-float stamp-ml" data-ref="AD1341" style="--size:140px;--dur:8s;--delay:-3s;--rot:8deg">
        <div class="stamp-img-wrap"><img src="images/stamp-2.jpg" alt="Estampa AD1341" draggable="false" /></div>
        <div class="stamp-ref">AD1341</div>
      </div>
      <div class="stamp-float stamp-bl" data-ref="NT8479" style="--size:138px;--dur:10s;--delay:-1s;--rot:-10deg">
        <div class="stamp-img-wrap"><img src="images/stamp-3.jpg" alt="Estampa NT8479" draggable="false" /></div>
        <div class="stamp-ref">NT8479</div>
      </div>
      <div class="stamp-float stamp-tr" data-ref="NT8023" style="--size:148px;--dur:9s;--delay:-2s;--rot:11deg">
        <div class="stamp-img-wrap"><img src="images/stamp-4.jpg" alt="Estampa NT8023" draggable="false" /></div>
        <div class="stamp-ref">NT8023</div>
      </div>
      <div class="stamp-float stamp-mr" data-ref="AD2339" style="--size:135px;--dur:11s;--delay:-5s;--rot:6deg">
        <div class="stamp-img-wrap"><img src="images/stamp-5.jpg" alt="Estampa AD2339" draggable="false" /></div>
        <div class="stamp-ref">AD2339</div>
      </div>
      <div class="stamp-float stamp-br" data-ref="NT6785" style="--size:142px;--dur:8.5s;--delay:-4s;--rot:-8deg">
        <div class="stamp-img-wrap"><img src="images/stamp-6.jpg" alt="Estampa NT6785" draggable="false" /></div>
        <div class="stamp-ref">NT6785</div>
      </div>
    </div>

    <div class="login-card">
      <div class="login-logo">
        <div class="logo-icon">
          <img src="images/logo-white.png" alt="Lumini" style="object-fit:contain;width:100%;height:100%" />
        </div>
        <h1 class="hero-title" translate="no">Lumini</h1>
        <p class="display-text">Gestão de Carreira &amp; Polivalência</p>
      </div>

      <form class="login-form" onsubmit="doLogin(); return false;">
        <div class="form-group">
          <label for="login-email"><i class="fas fa-envelope"></i> E-mail</label>
          <input type="email" id="login-email" name="email" placeholder="Digite seu e-mail" autocomplete="username" inputmode="email" autocapitalize="off" spellcheck="false" required />
        </div>
        <div class="form-group">
          <label for="login-password"><i class="fas fa-lock"></i> Senha</label>
          <div class="input-icon-right">
            <input type="password" id="login-password" name="password" placeholder="••••••••" autocomplete="current-password" required />
            <i class="fas fa-eye toggle-pass" onclick="togglePass()"></i>
          </div>
        </div>
        <div id="login-error" class="login-error hidden">E-mail ou senha incorretos.</div>
        <button type="submit" class="btn-primary btn-full">
          <i class="fas fa-sign-in-alt"></i> Entrar
        </button>
      </form>

      <div class="login-demo">
        <p><i class="fas fa-info-circle"></i> Em caso de dúvidas sobre seu acesso, contate o administrador.</p>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="js/firebase-config.js"></script>
<script src="js/data.js"></script>
<script src="js/rh-data.js"></script>
<script type="module" src="js/firebase-db.js"></script>
<script src="js/auth-config.js"></script>
<script src="js/app.js"></script>
</body>
</html>
